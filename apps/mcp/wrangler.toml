name = "anju-mcp"
main = "dist/index.js"
compatibility_date = "2025-11-17"

compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[build]
command = "npm run build"

[env.development]
name = "anju-mcp-development"
routes = [
  { pattern = "development-mcp.vocesqueabrazan.com", custom_domain = true }
]
[env.development.observability]
enabled = true
[env.development.observability.logs]
enabled = true
invocation_logs = true
[env.development.observability.traces]
enabled = false
[env.development.vars]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://development-api.vocesqueabrazan.com"
NEXT_PUBLIC_MCP_URL = "https://development-mcp.vocesqueabrazan.com"
NEXT_PUBLIC_WEB_URL = "https://development-app.vocesqueabrazan.com"
NEXT_PUBLIC_DOMAIN = "vocesqueabrazan.com"
[[env.development.hyperdrive]]
binding = "HYPERDRIVE"
id = "20b38b96e12a4f45ac111fb7d8161edf"
[[env.development.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "anju-storage-development"
[[env.development.durable_objects.bindings]]
name = "RESOURCE_HANDLER"
class_name = "ResourceHandler"
script_name = "anju-api-development"

[env.production]
name = "anju-mcp-production"
[env.production.observability]
enabled = true
[env.production.observability.logs]
enabled = true
invocation_logs = true
[env.production.observability.traces]
enabled = false
[env.production.vars]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://api.anju.ai"
NEXT_PUBLIC_MCP_URL = "https://mcp.anju.ai"
NEXT_PUBLIC_WEB_URL = "https://app.anju.ai"
NEXT_PUBLIC_DOMAIN = "anju.ai"
[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "<YOUR_HYPERDRIVE_ID>"
[[env.production.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "anju-storage-production"
[[env.production.durable_objects.bindings]]
name = "RESOURCE_HANDLER"
class_name = "ResourceHandler"
script_name = "anju-api-production"
