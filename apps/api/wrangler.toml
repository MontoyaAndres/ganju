name = "ganju-api"
main = "dist/index.js"
compatibility_date = "2025-11-17"

compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[limits]
cpu_ms = 30000

[build]
command = "npm run build"

[env.development]
name = "ganju-api-development"
routes = [
  { pattern = "development-api.vocesqueabrazan.com", custom_domain = true }
]
[env.development.observability]
enabled = true
[env.development.observability.logs]
enabled = true
invocation_logs = true
[env.development.observability.traces]
enabled = false
[env.development.vars]
NODE_ENV = "production"
RESOURCE_HANDLER_PORT="8082"
NEXT_PUBLIC_API_URL = "https://development-api.vocesqueabrazan.com"
NEXT_PUBLIC_MCP_URL = "https://development-mcp.vocesqueabrazan.com"
NEXT_PUBLIC_WEB_URL = "https://development-app.vocesqueabrazan.com"
NEXT_PUBLIC_DOMAIN = "vocesqueabrazan.com"
[[env.development.services]]
binding = "MCP"
service = "ganju-mcp-development"
[[env.development.services]]
binding = "API"
service = "ganju-api-development"
[[env.development.hyperdrive]]
binding = "HYPERDRIVE"
id = "bf3f371679734af2af0b11302b3cb971"
[[env.development.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "ganju-storage-development"
[[env.development.send_email]]
name = "SEND_EMAIL"
[[env.development.queues.producers]]
binding = "INDEX_QUEUE"
queue = "ganju-index-development"
[[env.development.queues.producers]]
binding = "CRAWL_DISCOVER_QUEUE"
queue = "ganju-crawl-discover-development"
[[env.development.queues.producers]]
binding = "CRAWL_PAGE_QUEUE"
queue = "ganju-crawl-page-development"
[[env.development.queues.producers]]
binding = "GDRIVE_DISCOVER_QUEUE"
queue = "ganju-gdrive-discover-development"
[[env.development.queues.producers]]
binding = "GDRIVE_FILE_QUEUE"
queue = "ganju-gdrive-file-development"
[[env.development.queues.producers]]
binding = "ONEDRIVE_DISCOVER_QUEUE"
queue = "ganju-onedrive-discover-development"
[[env.development.queues.producers]]
binding = "ONEDRIVE_FILE_QUEUE"
queue = "ganju-onedrive-file-development"
[[env.development.queues.consumers]]
queue = "ganju-index-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "ganju-index-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-crawl-discover-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 2
max_retries = 3
dead_letter_queue = "ganju-crawl-discover-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-crawl-page-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "ganju-crawl-page-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-gdrive-discover-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 2
max_retries = 3
dead_letter_queue = "ganju-gdrive-discover-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-gdrive-file-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "ganju-gdrive-file-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-onedrive-discover-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 2
max_retries = 3
dead_letter_queue = "ganju-onedrive-discover-dlq-development"
[[env.development.queues.consumers]]
queue = "ganju-onedrive-file-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "ganju-onedrive-file-dlq-development"
[[env.development.containers]]
class_name = "ResourceHandler"
image = "../resource-handler/Dockerfile"
image_build_context = "../.."
max_instances = 3
instance_type = "standard-1"
[[env.development.durable_objects.bindings]]
name = "RESOURCE_HANDLER"
class_name = "ResourceHandler"
[[env.development.durable_objects.bindings]]
name = "DISCORD_GATEWAY"
class_name = "DiscordGatewayDO"
[[env.development.migrations]]
tag = "v1"
new_sqlite_classes = ["ResourceHandler"]
[[env.development.migrations]]
tag = "v2"
new_sqlite_classes = ["DiscordGatewayDO"]

